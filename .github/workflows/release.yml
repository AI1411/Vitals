name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-linux-musl
            artifact: vitals-linux-x86_64
          - target: aarch64-linux-musl
            artifact: vitals-linux-aarch64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: |
          zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}
          mkdir -p dist
          cp zig-out/bin/vitals dist/vitals
          cd dist
          tar -czf ${{ matrix.artifact }}.tar.gz vitals

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/vitals-linux-x86_64/vitals-linux-x86_64.tar.gz
            artifacts/vitals-linux-aarch64/vitals-linux-aarch64.tar.gz
          generate_release_notes: true
